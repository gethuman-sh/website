{{ $alwaysVisible := .alwaysVisible | default false }}
{{ $homepage := .homepage | default false }}
<nav id="sticky-nav" class="sticky-nav{{ if $alwaysVisible }} visible always-visible{{ end }}{{ if $homepage }} homepage-nav{{ end }}">
  <div class="sticky-nav-inner">
    <a href="/" class="sticky-nav-logo">
      <img src="/h-l2.svg" alt="human logo" />
      <span>human</span>
    </a>
    <div class="sticky-nav-links">
      <a href="/tutorial/" class="sticky-nav-link{{ if and .Page (eq .Page.Section "tutorial") }} active{{ end }}">Tutorial</a>
      <a href="/features/" class="sticky-nav-link{{ if and .Page (eq .Page.Section "features") }} active{{ end }}">Features</a>
      <a href="/articles/" class="sticky-nav-link{{ if and .Page (eq .Page.Section "articles") }} active{{ end }}">Articles</a>
      <a href="/docs/" class="sticky-nav-link{{ if and .Page (eq .Page.Section "docs") }} active{{ end }}">Docs</a>
      <a
        class="github-badge github-badge--nav"
        href="{{ .Page.Site.Params.githubRepo }}"
        target="_blank"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">

          />
        </svg>
        <span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">

      </a>
    </div>
  </div>
</nav>
